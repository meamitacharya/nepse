name: Daily NEPSE Scraper

on:
  schedule:
    # 9:30 AM UTC = 3:15 PM Nepal Time (After Market Closes)
    # Runs Monday through Thursday and Sunday (0,1,2,3,4)
    - cron: '30 9 * * 0-4'
  workflow_dispatch: # Allows manual trigger from GitHub UI

jobs:
  scrape-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          cd backend
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Scraper
        env:
          # When deploying, you'll put your Supabase URL in GitHub Secrets
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          cd backend
          python scraper.py
